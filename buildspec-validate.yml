version: 0.2

# ─────────────────────────────────────────────────────────────
# Stage 1: Validate all CFN templates + upload to S3
# ─────────────────────────────────────────────────────────────

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      - pip install cfn-lint --quiet
      - apt-get update && apt-get install -y jq
  pre_build:
    commands:
      - echo "=== Validating CloudFormation templates ==="

      # ✅ Fix region issue
      - export AWS_REGION_NAME=${AWS_REGION:-ap-south-1}

      - |
        FAILED=0
        for template in $(find products -name "template.yaml"); do
          echo "→ Validating: $template"

          # cfn-lint
          cfn-lint "$template" && echo "  ✓ cfn-lint passed" || { echo "  ✗ cfn-lint FAILED"; FAILED=1; }

          # AWS validation
          aws cloudformation validate-template \
            --template-body "file://$template" \
            --region $AWS_REGION_NAME > /dev/null \
            && echo "  ✓ AWS validate passed" \
            || { echo "  ✗ AWS validate FAILED"; FAILED=1; }
        done

        if [ $FAILED -ne 0 ]; then
          echo "❌ One or more templates failed validation. Stopping."
          exit 1
        fi

  build:
    commands:
      - echo "=== Uploading templates to S3 ==="

      - |
        for product_dir in products/*/; do

          TEMPLATE_PATH="$product_dir/template.yaml"
          CONFIG_PATH="$product_dir/product-config.json"

          if [ ! -f "$TEMPLATE_PATH" ]; then
            echo "Skipping (no template.yaml)"
            continue
          fi

          if [ ! -f "$CONFIG_PATH" ]; then
            echo "Skipping (no product-config.json)"
            continue
          fi

          # ✅ Read from JSON
          PRODUCT_NAME=$(jq -r '.productName' "$CONFIG_PATH")
          PRODUCT_VERSION=$(jq -r '.productVersion' "$CONFIG_PATH")

          echo "→ Processing $PRODUCT_NAME version $PRODUCT_VERSION"

          # ✅ Versioned upload
          S3_KEY="products/$PRODUCT_NAME/$PRODUCT_VERSION/template.yaml"
          aws s3 cp "$TEMPLATE_PATH" "s3://$TEMPLATE_BUCKET/$S3_KEY"

          echo "  ✓ Uploaded version → $S3_KEY"

          # ✅ Latest pointer
          aws s3 cp "$TEMPLATE_PATH" \
            "s3://$TEMPLATE_BUCKET/products/$PRODUCT_NAME/latest/template.yaml"

          echo "  ✓ Updated latest pointer"

        done

artifacts:
  files:
    - "**/*"
  name: ValidatedArtifacts